name: R syntax check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parse-r-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Parse all R files
        shell: Rscript {0}
        run: |
          files <- c(list.files("R", pattern = "\\.[Rr]$", full.names = TRUE),
                     list.files(".", pattern = "\\.[Rr]$", full.names = TRUE))
          files <- unique(files)
          for (file in files) {
            message("Parsing ", file)
            parse(file = file)
          }
          message("All R files parsed successfully.")
