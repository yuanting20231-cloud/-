name: R validation and Figure 3

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  parse-r-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Parse all R files
        shell: Rscript {0}
        run: |
          files <- c(list.files("R", pattern = "\\.[Rr]$", full.names = TRUE),
                     list.files(".", pattern = "\\.[Rr]$", full.names = TRUE))
          files <- unique(files)
          for (file in files) {
            message("Parsing ", file)
            parse(file = file)
          }
          message("All R files parsed successfully.")

  run-figure3:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          cache-version: 1
      - name: Run Figure 3
        continue-on-error: true
        shell: Rscript {0}
        run: |
          source("run_figure3.R")
      - name: Upload Figure 3 outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: figure3-results
          path: output/
          if-no-files-found: error
          retention-days: 30
